<!DOCTYPE html>
<html>

<head>
    <title>Technician Calibration Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <div class="logo">
        ⚙️
    </div>

    <h1>Technician Calibration Portal</h1>
    <p>Truck Calibration Data Viewer</p>
</div>

<div class="container">

    <div class="truck-icon">
        🚚
    </div>

    <h2>Search Calibration Data</h2>

    <input
        id="vinInput"
        type="text"
        placeholder="Enter VIN">

    <button onclick="loadCalibration()">
        Load Data
    </button>

    <button onclick="logout()">
        Logout
    </button>
    <div id="message"></div>

<div id="calibrationSection" style="display:none;">

    <h2>Available Calibrations</h2>

    <div id="calibrationList"></div>

</div>
</div>

<script type="module" src="technician.js"></script>

</body>

</html>
