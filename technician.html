<!DOCTYPE html>
<html>

<head>
    <title>Technician Calibration Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <div class="logo">
        ⚙️
    </div>

    <h1>Technician Calibration Portal</h1>
    <p>Truck Calibration Data Viewer</p>
</div>

<div class="container">

    <div class="truck-icon">
        🚚
    </div>

    <h2>Search Calibration Data</h2>

    <input
        id="vinInput"
        type="text"
        placeholder="Enter VIN">

    <button onclick="loadCalibration()">
        Load Data
    </button>

    <button onclick="logout()">
        Logout
    </button>

    <h2>Calibration Information</h2>

    <div id="calibrationData">

    <table class="calibration-table">
        <thead>
            <tr>
                <th>Measurement</th>
                <th>Empty Up</th>
                <th>Empty Down</th>
                <th>Loaded Up</th>
                <th>Loaded Down</th>
            </tr>
        </thead>

        <tbody id="calibrationBody">

        </tbody>
    </table>

</div>

</div>

<script type="module" src="technician.js"></script>

</body>

</html>
