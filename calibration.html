<!DOCTYPE html>
<html>

<head>
    <title>Calibration Data</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h1>Truck Calibration Data</h1>
</div>

<div class="spacing-container">

    <h2>Axle Spacing</h2>

    <div class="spacing-row">
        <label>VIN:</label>
        <span id="VIN"></span>
    </div>

    <div class="spacing-row">
        <label>Front-Lift:</label>
        <span id="frToLift"></span>
    </div>

    <div class="spacing-row">
        <label>Lift to Front Tandem:</label>
        <span id="liftToFrTan"></span>
    </div>

    <div class="spacing-row">
        <label>Tandem Spacing:</label>
        <span id="tanSpacing"></span>
    </div>

</div>


<div class="weights-wrapper">

    <div class="weight-container">

        <h2>Empty Weight (KG)</h2>

        <table class="weight-table">

            <tr>
                <th></th>
                <th>Lift Axle Up</th>
                <th>Lift Axle Down</th>
            </tr>

            <tr>
                <td>Front</td>
                <td id="emFrWtUp"></td>
                <td id="emFrWtDw"></td>
            </tr>

            <tr>
                <td>Lift</td>
                <td>-</td>
                <td id="emLiftWt"></td>
            </tr>

            <tr>
                <td>Front Tandem</td>
                <td id="emFrTanWtUp"></td>
                <td id="emFrTanWtDw"></td>
            </tr>

            <tr>
                <td>Rear Tandem</td>
                <td id="emRearTanWtUp"></td>
                <td id="emRearTanWtDw"></td>
            </tr>

            <tr>
                <td>Tandem Sensor</td>
                <td id="emTanSenUp"></td>
                <td id="emTanSenDw"></td>
            </tr>

            <tr>
                <td>Pressure (RBP)</td>
                <td>-</td>
                <td id="emRBP"></td>
            </tr>

        </table>

    </div>


    <div class="weight-container">

        <h2>Loaded Weight (KG)</h2>

        <table class="weight-table">

            <tr>
                <th></th>
                <th>Lift Axle Up</th>
                <th>Lift Axle Down</th>
            </tr>

            <tr>
                <td>Front</td>
                <td id="ldFrWtUp"></td>
                <td id="ldFrWtDw"></td>
            </tr>

            <tr>
                <td>Lift</td>
                <td>-</td>
                <td id="ldLiftWt"></td>
            </tr>

            <tr>
                <td>Front Tandem</td>
                <td id="ldFrTanWtUp"></td>
                <td id="ldFrTanWtDw"></td>
            </tr>

            <tr>
                <td>Rear Tandem</td>
                <td id="ldRearTanWtUp"></td>
                <td id="ldRearTanWtDw"></td>
            </tr>

            <tr>
                <td>Tandem Sensor</td>
                <td id="ldTanSenUp"></td>
                <td id="ldTanSenDw"></td>
            </tr>

            <tr>
                <td>Pressure (RBP)</td>
                <td>-</td>
                <td id="ldRBP"></td>
            </tr>

        </table>

    </div>

</div>

<script src="calibration.js"></script>

</body>

</html>
